  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #06090e; }
  .stage {
    position: relative;
    width: 1280px; height: 400px;
    background: linear-gradient(180deg, #090d14 0%, #0c121c 100%);
    overflow: hidden;
    font-family: ui-monospace, 'Cascadia Code', Consolas, 'SF Mono', monospace;
  }
  .glow {
    position: absolute; width: 480px; height: 480px;
    left: 810px; top: 90px; border-radius: 50%;
    background: radial-gradient(circle, rgba(44,165,224,.16) 0%, rgba(44,165,224,0) 62%);
  }

  /* ── left: language ── */
  .left { position: absolute; left: 110px; top: 92px; }
  .spec {
    font-size: 12px; letter-spacing: 4px; color: #545f6e;
  }
  .wordmark {
    margin-top: 14px;
    font-family: 'Jura', sans-serif; font-weight: 300;
    font-size: 78px; line-height: 1; letter-spacing: 9px;
    color: #e8edf4; white-space: nowrap;
  }
  .wordmark b { font-weight: 300; color: #2ca5e0; }
  .rule { width: 420px; height: 1px; background: #343e4e; margin: 22px 0 20px; }
  .tagline { font-size: 14px; letter-spacing: 3px; color: #8b96a5; }
  .caps { margin-top: 14px; font-size: 11px; letter-spacing: 3px; color: #545f6e; }

  /* ── right: the module grid ── */
  .grid-wrap { position: absolute; right: 120px; top: 62px; }
  .col-idx {
    display: grid; grid-template-columns: repeat(6, 46px); gap: 22px;
    margin-left: 32px; margin-bottom: 12px;
  }
  .col-idx span { font-size: 11px; color: #545f6e; text-align: center; }
  .body { display: flex; }
  .row-idx {
    display: grid; grid-template-rows: repeat(4, 46px); gap: 22px;
    width: 32px;
  }
  .row-idx span {
    font-size: 11px; color: #545f6e;
    display: flex; align-items: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 46px);
    grid-template-rows: repeat(4, 46px);
    gap: 22px;
  }
  .cell {
    border: 1.2px solid #2c3544; border-radius: 5px; position: relative;
  }
  .cell.dim { border-color: #1f2632; }
  .cell i {
    position: absolute; left: 8px; top: 8px; width: 7px; height: 1.2px;
    background: #1f2632; display: block;
  }
  .cell.accent {
    border: none; background: #2ca5e0; border-radius: 5px;
    box-shadow: 0 0 34px rgba(44,165,224,.45);
  }
  .leader {
    position: absolute; width: 1.2px; height: 22px; background: #3a6986;
    left: 810px; top: 336px;
  }
  .designation {
    position: absolute; top: 366px; left: 810px; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 2px; color: #2ca5e0; white-space: nowrap;
  }

  .grid-wrap, .leader, .designation { display: none; }
  .art {
    position: absolute; right: -90px; top: 50%; transform: translateY(-50%);
    height: 540px;
    -webkit-mask-image: linear-gradient(90deg, transparent 18%, black 62%);
    mask-image: linear-gradient(90deg, transparent 18%, black 62%);
    opacity: 0.95;
  }
</style>
</head>
